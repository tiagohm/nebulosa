<section
	*ngIf="showTopBar"
	id="titlebar"
	class="sticky flex flex-row items-center justify-end gap-2 pr-1"
	[style]="{ height: '42px', zIndex: '1000', backgroundColor: '#212121' }">
	<span class="draggable-region flex min-h-full flex-1 flex-col items-center justify-center text-center font-bold">
		<div>{{ title }}</div>
		<div class="text-xs font-normal text-gray-200">{{ subTitle }}</div>
	</span>
	<neb-menu-bar
		*ngIf="topMenu.length"
		[model]="topMenu" />
	<span
		class="separator flex justify-center"
		*ngIf="topMenu.length"></span>
	<p-button
		*ngIf="pinned && !modal"
		[text]="true"
		[rounded]="true"
		size="small"
		icon="mdi mdi-pin text-gray-200"
		(onClick)="pin()"
		pTooltip="Unpin Window"
		tooltipPosition="bottom"
		styleClass="select-none cursor-pointer"></p-button>
	<p-button
		*ngIf="!pinned && !modal"
		[text]="true"
		[rounded]="true"
		size="small"
		icon="mdi mdi-pin-off text-gray-200"
		(onClick)="pin()"
		pTooltip="Pin Window"
		tooltipPosition="bottom"
		styleClass="select-none cursor-pointer"></p-button>
	<p-button
		*ngIf="!modal"
		[text]="true"
		[rounded]="true"
		size="small"
		icon="mdi mdi-window-minimize text-gray-200"
		(onClick)="minimize()"
		styleClass="select-none cursor-pointer"></p-button>
	<p-button
		*ngIf="!modal && maximizable"
		[text]="true"
		[rounded]="true"
		size="small"
		icon="mdi mdi-window-maximize text-gray-200"
		(onClick)="maximize()"
		styleClass="select-none cursor-pointer"></p-button>
	<p-button
		[text]="true"
		[rounded]="true"
		size="small"
		icon="mdi mdi-window-close text-danger"
		(onClick)="close()"
		styleClass="select-none cursor-pointer mr-1"></p-button>
</section>

<section id="main">
	<router-outlet></router-outlet>
</section>

<p-toast position="bottom-center" />
<p-confirmDialog [style]="{ minWidth: '320px', maxWidth: '80px' }" />
