<div class="m-0 flex items-center px-4 py-2">
	<div class="flex w-1/4 items-center font-bold">
		<i class="mdi mdi-circle {{ property.state }}"></i>
		<span class="ml-2">{{ property.label }}</span>
	</div>
	<div class="col-9">
		<div
			class="flex items-center gap-1"
			*ngIf="property.type === 'SWITCH' && property.rule === 'ONE_OF_MANY'">
			<p-button
				*ngFor="let item of property.items"
				[disabled]="property.perm === 'RO' || disabled"
				[label]="item.label"
				(onClick)="sendSwitch(item)"
				icon="pi"
				[severity]="item.value ? 'success' : 'danger'"
				size="small"
				[text]="true">
				<span
					[class.mdi-check]="item.value"
					[class.mdi-close]="!item.value"
					class="mdi"></span>
			</p-button>
		</div>
		<div
			class="flex items-center gap-1"
			*ngIf="property.type === 'SWITCH' && property.rule === 'AT_MOST_ONE'">
			<p-button
				*ngFor="let item of property.items"
				[disabled]="property.perm === 'RO' || disabled"
				[label]="item.label"
				(onClick)="sendSwitch(item)"
				icon="mdi mdi-check"
				size="small"
				[text]="true" />
		</div>
		<div
			class="flex items-center gap-1"
			*ngIf="property.type === 'SWITCH' && property.rule === 'ANY_OF_MANY'">
			<p-button
				*ngFor="let item of property.items"
				[disabled]="property.perm === 'RO' || disabled"
				[label]="item.label"
				(onClick)="sendSwitch(item)"
				icon="pi"
				[severity]="item.value ? 'success' : 'danger'"
				size="small"
				[text]="true">
				<span
					[class.mdi-check]="item.value"
					[class.mdi-close]="!item.value"
					class="mdi"></span>
			</p-button>
		</div>
		<div
			class="flex items-center"
			*ngIf="property.type === 'NUMBER'">
			<div class="col-9 flex-col">
				<div
					*ngFor="let item of property.items"
					class="my-0 flex items-center">
					<div
						class="w-1/2"
						*ngIf="property.perm !== 'WO'">
						<p-floatLabel class="w-full">
							<input
								pInputText
								readonly
								class="p-inputtext-sm min-w-full max-w-0 border-0"
								[value]="item.value" />
							<label>{{ item.label }}</label>
						</p-floatLabel>
					</div>
					<div
						class="w-1/2"
						*ngIf="property.perm !== 'RO'">
						<p-floatLabel class="w-full">
							<input
								pInputText
								class="p-inputtext-sm min-w-full max-w-0 border-0"
								[(ngModel)]="item.valueToSend" />
							<label>{{ item.label }}</label>
						</p-floatLabel>
					</div>
				</div>
			</div>
			<div class="w-1/4 text-center">
				<p-button
					[disabled]="disabled"
					*ngIf="property.perm !== 'RO'"
					label="Send"
					(onClick)="sendNumber()"
					icon="mdi mdi-send"
					size="small"
					[text]="true" />
			</div>
		</div>
		<div
			class="flex items-center"
			*ngIf="property.type === 'TEXT'">
			<div class="col-9 flex-col">
				<div
					*ngFor="let item of property.items"
					class="my-0 flex items-center">
					<div
						class="w-1/2"
						*ngIf="property.perm !== 'WO'">
						<p-floatLabel class="w-full">
							<input
								pInputText
								readonly
								class="p-inputtext-sm min-w-full max-w-0 border-0"
								[value]="item.value" />
							<label>{{ item.label }}</label>
						</p-floatLabel>
					</div>
					<div
						class="w-1/2"
						*ngIf="property.perm !== 'RO'">
						<p-floatLabel class="w-full">
							<input
								pInputText
								class="p-inputtext-sm min-w-full max-w-0 border-0"
								[(ngModel)]="item.valueToSend" />
							<label>{{ item.label }}</label>
						</p-floatLabel>
					</div>
				</div>
			</div>
			<div class="w-1/4 text-center">
				<p-button
					[disabled]="disabled"
					*ngIf="property.perm !== 'RO'"
					label="Send"
					(onClick)="sendText()"
					icon="mdi mdi-send"
					size="small"
					[text]="true" />
			</div>
		</div>
	</div>
</div>
