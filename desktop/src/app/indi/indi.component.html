<div class="container px-4 py-3">
	<div class="flex items-center">
		<div class="sm:col-4 w-full">
			<p-floatLabel class="w-full">
				<p-dropdown
					[options]="devices"
					[ngModel]="device"
					(ngModelChange)="deviceChanged($event)"
					optionLabel="name"
					styleClass="border-0"
					emptyMessage="No device found"
					[autoDisplayFirst]="false" />
				<label>Device</label>
			</p-floatLabel>
		</div>
		<div class="flex w-full flex-row items-center gap-1 sm:w-8/12">
			<p-splitButton
				[label]="group"
				icon="mdi mdi-sitemap"
				(onClick)="changeGroup(group)"
				[model]="groups"
				class="w-auto"
				[style]="{ width: '260px' }" />
			<p-button
				label="Log"
				icon="mdi mdi-post"
				(onClick)="showLog = true"
				[text]="!showLog"
				severity="success"
				size="small" />
		</div>
	</div>
	<div class="properties mt-2 grid">
		<div class="w-full flex-col">
			<div *ngFor="let property of properties">
				<neb-indi-property
					*ngIf="!showLog && property.group === group"
					[property]="property"
					(onSend)="send($event)" />
			</div>
			<div
				class="flex h-full w-full flex-col text-gray-200"
				*ngIf="showLog">
				<p-listbox
					#listbox
					[options]="messages"
					[filter]="true"
					class="h-full"
					styleClass="border-0 h-full"
					[listStyle]="{ maxHeight: 'calc(100vh - 174px)' }" />
			</div>
		</div>
	</div>
</div>
