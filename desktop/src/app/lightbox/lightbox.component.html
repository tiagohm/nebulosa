<div class="container px-4 py-3">
	<div class="flex items-center">
		<div class="w-full items-center gap-2">
			<neb-device-name [device]="lightBox" />
			<p-button
				*ngIf="lightBox.connected"
				(onClick)="connect()"
				icon="mdi mdi-close"
				size="small"
				severity="danger"
				pTooltip="Disconnect"
				tooltipPosition="bottom"
				[text]="true" />
			<p-button
				*ngIf="!lightBox.connected"
				(onClick)="connect()"
				icon="mdi mdi-connection"
				size="small"
				severity="info"
				pTooltip="Connect"
				tooltipPosition="bottom"
				[text]="true" />
		</div>
	</div>
	<div class="mt-1 grid">
		<div class="col-4 items-center justify-center text-center">
			<div class="flex flex-col items-center justify-center gap-2 text-center">
				<span class="text-xs text-gray-100">Enabled</span>
				<p-inputSwitch
					[disabled]="!lightBox.connected"
					[ngModel]="lightBox.enabled"
					(ngModelChange)="toggleEnable()" />
			</div>
		</div>
		<div class="flex w-8/12 items-center justify-center">
			<p-knob
				[disabled]="!lightBox.connected || !lightBox.enabled"
				[min]="lightBox.minIntensity"
				[max]="lightBox.maxIntensity"
				[step]="1"
				[ngModel]="lightBox.intensity"
				(ngModelChange)="intensityChanged($event)"
				spinnableNumber />
		</div>
	</div>
</div>
