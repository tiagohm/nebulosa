<div class="container px-4 py-3">
	<div class="flex items-center">
		<div class="w-full items-center gap-2">
			<neb-device-name [device]="wheel" />
			<p-button
				*ngIf="wheel.connected"
				[disabled]="!wheel || moving"
				(onClick)="connect()"
				icon="mdi mdi-close"
				size="small"
				severity="danger"
				pTooltip="Disconnect"
				tooltipPosition="bottom"
				[text]="true" />
			<p-button
				*ngIf="!wheel.connected"
				[disabled]="!wheel || moving"
				(onClick)="connect()"
				icon="mdi mdi-connection"
				size="small"
				severity="info"
				pTooltip="Connect"
				tooltipPosition="bottom"
				[text]="true" />
		</div>
		<div
			*ngIf="canShowInfo"
			class="my-1 flex w-full items-center gap-1 pt-0 text-sm text-gray-400">
			<i class="mdi mdi-information text-info"></i>
			<span class="mr-3">{{ moving ? 'moving' : 'idle' }}</span>
			<p-tag
				*ngIf="wheel.connected && currentFilter && currentFilter.position"
				value="#{{ currentFilter.position }}" />
			<p-tag
				*ngIf="wheel.connected && currentFilter"
				[value]="currentFilter.name"
				severity="info" />
		</div>
	</div>
	<div class="mt-2 grid">
		<div class="col-9">
			<p-floatLabel class="w-full">
				<p-dropdown
					[disabled]="!wheel.connected || moving"
					[options]="filters"
					[(ngModel)]="filter"
					styleClass="border-0"
					emptyMessage="No filter found"
					[autoDisplayFirst]="false"
					(ngModelChange)="filterChanged()"
					appendTo="body">
					<ng-template
						let-item
						pTemplate="selectedItem">
						<div class="flex flex-col justify-center gap-1">
							<span
								class="flex items-center gap-1 text-xs"
								style="min-height: 15px">
								<p-tag
									*ngIf="filter"
									value="#{{ filter.position }}" />
								<p-tag
									*ngIf="filter"
									value="OFFSET: {{ focusOffsetForFilter(filter) }}"
									severity="success" />
								<i
									*ngIf="filter?.dark"
									class="mdi mdi-camera-iris"></i>
							</span>
							<span>{{ filter?.name }}</span>
						</div>
					</ng-template>
					<ng-template
						let-item
						pTemplate="item">
						<div class="flex flex-col justify-center gap-1">
							<span
								class="flex items-center gap-1 text-xs"
								style="min-height: 15px">
								<p-tag value="#{{ item.position }}" />
								<p-tag
									value="OFFSET: {{ focusOffsetForFilter(item) }}"
									severity="success" />
								<i
									*ngIf="item.dark"
									class="mdi mdi-camera-iris"></i>
							</span>
							<span>{{ item.name }}</span>
						</div>
					</ng-template>
				</p-dropdown>
				<label>Filter</label>
			</p-floatLabel>
		</div>
		<div class="flex w-1/4 items-center justify-center">
			<p-button
				[disabled]="!canMoveTo || !wheel.connected || moving || filter?.position === position"
				label="Move"
				icon="mdi mdi-check"
				(onClick)="moveToSelectedFilter()"
				size="small"
				[text]="true" />
		</div>
	</div>
	<div
		class="mt-2 grid"
		*ngIf="filter && canEdit">
		<div class="w-8/12">
			<p-floatLabel>
				<input
					pInputText
					[disabled]="!wheel.connected || moving"
					[(ngModel)]="filter.name"
					(ngModelChange)="filterNameChanged(filter)"
					[maxLength]="16"
					class="p-inputtext-sm w-full border-0" />
				<label>Name</label>
			</p-floatLabel>
		</div>
		<div class="col-4 flex flex-col justify-center gap-2">
			<p-checkbox
				[binary]="true"
				[disabled]="!wheel.connected || moving"
				[ngModel]="filter.dark"
				(onChange)="shutterToggled(filter, $event)"
				label="Shutter" />
		</div>
	</div>
	<div
		*ngIf="filter"
		class="mt-1 grid">
		<div class="flex w-full items-center justify-between gap-2">
			<neb-device-chooser
				title="FOCUSER"
				icon="mdi mdi-image-filter-center-focus"
				[disabled]="!canChangeFocusOffset"
				[devices]="focusers"
				[(device)]="focuser"
				(deviceChange)="focuserChanged()"
				(deviceConnect)="focuserChanged()"
				style="max-width: 60%" />
			<p-floatLabel>
				<p-inputNumber
					[disabled]="!wheel.connected || moving || !focuser?.connected || !canChangeFocusOffset"
					[(ngModel)]="focuserOffset"
					[min]="focuserMinPosition"
					[max]="focuserMaxPosition"
					[showButtons]="true"
					locale="en"
					styleClass="border-0 w-full p-inputtext-sm"
					(ngModelChange)="focusOffsetChanged()"
					spinnableNumber />
				<label>Focus offset</label>
			</p-floatLabel>
		</div>
	</div>
	<div
		class="mt-2 grid"
		*ngIf="canApply">
		<div class="flex w-full justify-center gap-2">
			<p-button
				[disabled]="!wheel.connected || !filter || !filters.length"
				label="Save"
				(onClick)="apply()"
				icon="mdi mdi-content-save"
				severity="info"
				size="small" />
		</div>
	</div>
</div>
