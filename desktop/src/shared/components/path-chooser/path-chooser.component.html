<div class="flex items-center gap-1">
	<p-floatLabel class="w-full">
		<input
			pInputText
			[disabled]="disabled"
			[readonly]="readonly"
			class="p-inputtext-sm w-full border-0"
			[placeholder]="placeholder ?? ''"
			[ngModel]="path"
			(ngModelChange)="pathChange.emit($event)" />
		<label>{{ label ?? 'Path' }}</label>
	</p-floatLabel>
	<p-button
		[disabled]="disabled || readonly"
		icon="mdi mdi-folder-open"
		size="small"
		[text]="true"
		(onClick)="choosePath()"
		pTooltip="{{ directory ? 'Choose directory' : 'Choose file' }}"
		tooltipPosition="left"
		positionTop="1"
		positionLeft="-1" />
</div>
